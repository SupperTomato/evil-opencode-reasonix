name: Poll Evil OpenCode Releases

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      evil_release_tag:
        description: Optional override tag to dispatch immediately
        required: false
        type: string

permissions:
  actions: write
  contents: read

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - id: poll
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          WORKFLOW_OVERRIDE_TAG: ${{ inputs.evil_release_tag }}
        run: node scripts/release/poll-evil-opencode.js

      - if: steps.poll.outputs.should_build == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "build-and-release.yml",
              ref: context.ref.replace("refs/heads/", ""),
              inputs: {
                evil_release_tag: "${{ steps.poll.outputs.evil_release_tag }}",
                source_mode: "auto",
                dry_run: "false"
              }
            })
